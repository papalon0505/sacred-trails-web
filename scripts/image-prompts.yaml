# Sacred Trails Web — Image Generation Prompts
# 37 images total: 1 OG + 18 hero + 18 map
# Generated: 2026-04-23
#
# Style anchors:
#   hero: cinematic travel photography, golden hour, 16:9 (1200×630px)
#   map:  vintage hand-drawn illustrated map, watercolor on aged parchment, 8:5 (800×500px)
#
# Usage:
#   Hero → OpenAI Images API, model=gpt-image-1, size=1792x1024 (crop to 1200×630)
#   Map  → OpenAI Images API, model=gpt-image-1, size=1024x1024 (crop to 800×500)
#   OG   → OpenAI Images API, model=gpt-image-1, size=1792x1024
#
# Output paths:
#   public/og.jpg
#   public/routes/{slug}/hero.jpg
#   public/routes/{slug}/map.png

global:
  hero_style: "bright modern art illustration, bold flat design, vibrant forest green and warm amber color palette, clean geometric shapes, contemporary travel poster aesthetic, high contrast, luminous sky, no people, no text, no watermarks, graphic art style"
  map_style: "bright modern illustrated map, clean flat design, bold forest green and amber accent colors on cream white background, minimalist linework, geometric terrain shapes, contemporary graphic art, decorative compass rose, no photographs, overhead view"
  negative: "no watermarks, no text overlays, no logos, no dark moody tones, no film grain, no vintage effects, no photorealism"

# ─────────────────────────────────────────
# OG IMAGE (1 image)
# ─────────────────────────────────────────
og:
  filename: "public/og.jpg"
  size: "1792x1024"
  prompt: >
    Bright modern art illustration, bold graphic travel poster showing four sacred pilgrimage landscapes
    in a clean split panorama: (left) Camino Francés crossing the Pyrenees with vibrant green hills and
    golden sky, (center-left) Kumano Nakahechi ancient cedar forest corridor with luminous amber light
    filtering through tall trees, (center-right) Camino del Norte coastal cliffs with deep forest green
    and bright sky, (right) Shikoku Henro mountain path with cherry blossoms in warm amber tones.
    Bold flat design, forest green and amber color palette, cream white background, contemporary
    travel poster aesthetic, high contrast, no people, no text, no watermarks, graphic art style.

# ─────────────────────────────────────────
# ROUTE IMAGES (18 × 2 = 36 images)
